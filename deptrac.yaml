deptrac:
    paths:
        - ./src
    exclude_files:
        - '#^src/Kernel\.php$#'
    layers:
        # Shared
        -
            name: SharedDomain
            collectors:
                -
                    type: directory
                    value: src/Shared/Domain/.*
        # Voucher
        -
            name: VoucherDomain
            collectors:
                -
                    type: directory
                    value: src/Voucher/Domain/.*
        -
            name: VoucherApplication
            collectors:
                -
                    type: directory
                    value: src/Voucher/Application/.*
        -
            name: VoucherInfrastructure
            collectors:
                -
                    type: directory
                    value: src/Voucher/Infrastructure/.*
        -
            name: VoucherUI
            collectors:
                -
                    type: directory
                    value: src/Voucher/UI/.*
    ruleset:
        # Voucher
        VoucherDomain:
            - SharedDomain
