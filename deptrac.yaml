deptrac:
    paths:
        - ./src
    exclude_files:
        - '#^src/Kernel\.php$#'
    layers:
        # Shared
        -
            name: SharedDomain
            collectors:
                -
                    type: directory
                    value: src/Shared/Domain/.*
        -   name: SharedApplication
            collectors:
                -   type: directory
                    value: src/Shared/Application/.*
        -   name: SharedInfrastructure
            collectors:
                -   type: directory
                    value: src/Shared/Infrastructure/.*
        # Auth
        -   name: AuthDomain
            collectors:
                -   type: directory
                    value: src/Auth/Domain/.*
        -   name: AuthApplication
            collectors:
                -   type: directory
                    value: src/Auth/Application/.*
        -   name: AuthInfrastructure
            collectors:
                -   type: directory
                    value: src/Auth/Infrastructure/.*
        # Voucher
        -
            name: VoucherDomain
            collectors:
                -
                    type: directory
                    value: src/Voucher/Domain/.*
        -
            name: VoucherApplication
            collectors:
                -
                    type: directory
                    value: src/Voucher/Application/.*
        -
            name: VoucherInfrastructure
            collectors:
                -
                    type: directory
                    value: src/Voucher/Infrastructure/.*
        -
            name: VoucherUI
            collectors:
                -
                    type: directory
                    value: src/Voucher/UI/.*
        # External
        -
            name: Symfony
            collectors:
                -   type: classLike
                    value: ^Symfony\\
        -   name: PHPStan
            collectors:
                -   type: classLike
                    value: ^PHPStan\\
        -   name: PhpParser
            collectors:
                -   type: classLike
                    value: ^PhpParser\\
    ruleset:
        # Shared
        SharedDomain:
        SharedApplication:
            - SharedDomain
        SharedInfrastructure:
            - SharedApplication
            - SharedDomain
            - Symfony
            - PHPStan
            - PhpParser
        # Auth
        AuthDomain:
            - SharedDomain
        AuthApplication:
        AuthInfrastructure:
        # Voucher
        VoucherDomain:
            - SharedDomain
        # External
        Symfony:
        PHPStan:
        PhpParser:
