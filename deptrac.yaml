deptrac:
    paths:
        - ./src
    exclude_files:
        - '#^src/Kernel\.php$#'
    layers:
        # Shared
        -
            name: SharedDomain
            collectors:
                -
                    type: directory
                    value: src/Shared/Domain/.*
        -
            name: SharedApplication
            collectors:
                -
                    type: directory
                    value: src/Shared/Application/.*
        -
            name: SharedInfrastructure
            collectors:
                -
                    type: directory
                    value: src/Shared/Infrastructure/.*
        -
            name: SharedUI
            collectors:
                -
                    type: directory
                    value: src/Shared/UI/.*
        # Auth
        -
            name: AuthDomain
            collectors:
                -
                    type: directory
                    value: src/Auth/Domain/.*
        -
            name: AuthApplication
            collectors:
                -
                    type: directory
                    value: src/Auth/Application/.*
        -
            name: AuthInfrastructure
            collectors:
                -
                    type: directory
                    value: src/Auth/Infrastructure/.*
        -
            name: AuthUI
            collectors:
                -
                    type: directory
                    value: src/Auth/UI/.*
        # Voucher
        -
            name: VoucherDomain
            collectors:
                -
                    type: directory
                    value: src/Voucher/Domain/.*
        -
            name: VoucherApplication
            collectors:
                -
                    type: directory
                    value: src/Voucher/Application/.*
        -
            name: VoucherInfrastructure
            collectors:
                -
                    type: directory
                    value: src/Voucher/Infrastructure/.*
        -
            name: VoucherUI
            collectors:
                -
                    type: directory
                    value: src/Voucher/UI/.*
        # Provider
        -
            name: ProviderDomain
            collectors:
                -
                    type: directory
                    value: src/Provider/Domain/.*
        -
            name: ProviderApplication
            collectors:
                -
                    type: directory
                    value: src/Provider/Application/.*
        -
            name: ProviderInfrastructure
            collectors:
                -
                    type: directory
                    value: src/Provider/Infrastructure/.*
        -
            name: ProviderUI
            collectors:
                -
                    type: directory
                    value: src/Provider/UI/.*
        # External
        -
            name: Symfony
            collectors:
                -
                    type: classLike
                    value: ^Symfony\\
        -
            name: PHPStan
            collectors:
                -
                    type: classLike
                    value: ^PHPStan\\
        -
            name: PhpParser
            collectors:
                -
                    type: classLike
                    value: ^PhpParser\\
        -
            name: Doctrine
            collectors:
                -
                    type: classLike
                    value: ^Doctrine\\
        -
            name: Hidehalo
            collectors:
                -
                    type: classLike
                    value: ^Hidehalo\\
        -
            name: Gesdinet
            collectors:
                -
                    type: classLike
                    value: ^Gesdinet\\
        -
            name: Lexik
            collectors:
                -
                    type: classLike
                    value: ^Lexik\\
        -
            name: Nelmio
            collectors:
                -   type: classLike
                    value: ^Nelmio\\
        -
            name: OpenApi
            collectors:
                -   type: classLike
                    value: ^OpenApi\\
    ruleset:
        # Shared
        SharedDomain:
        SharedApplication:
            - SharedDomain
        SharedInfrastructure:
            - SharedApplication
            - SharedDomain
            - Symfony
            - PHPStan
            - PhpParser
            - Doctrine
        SharedUI:
            - Symfony
            - SharedApplication
            - SharedDomain
            - OpenApi
            - Nelmio
        # Auth
        AuthDomain:
            - SharedDomain
        AuthApplication:
            - AuthDomain
            - SharedApplication
            - SharedDomain
        AuthInfrastructure:
            - AuthApplication
            - AuthDomain
            - SharedInfrastructure
            - SharedApplication
            - SharedDomain
            - Symfony
            - Doctrine
            - Gesdinet
        AuthUI:
            - Symfony
            - AuthInfrastructure
            - AuthApplication
            - SharedApplication
            - SharedUI
            - Doctrine
            - Lexik
            - Nelmio
            - OpenApi
        # Voucher
        VoucherDomain:
            - SharedDomain
        VoucherApplication:
            - VoucherDomain
            - SharedApplication
            - SharedDomain
        VoucherInfrastructure:
            - VoucherApplication
            - VoucherDomain
            - SharedInfrastructure
            - SharedApplication
            - SharedDomain
            - Symfony
            - Doctrine
            - Hidehalo
        VoucherUI:
            - VoucherDomain
            - VoucherApplication
            - SharedApplication
            - SharedDomain
            - SharedUI
            - Symfony
            - Nelmio
            - OpenApi
        # Provider
        ProviderDomain:
            - SharedDomain
        ProviderApplication:
            - ProviderDomain
            - SharedApplication
            - SharedDomain
        ProviderInfrastructure:
            - ProviderDomain
            - ProviderApplication
            - SharedInfrastructure
            - SharedApplication
            - SharedDomain
            - Doctrine
            - Symfony
        ProviderUI:
            - SharedApplication
            - ProviderApplication
            - ProviderDomain
            - SharedUI
            - SharedDomain
            - Symfony
            - Nelmio
            - OpenApi
        # External
        Symfony:
        PHPStan:
        PhpParser:
        Doctrine:
        Hidehalo:
